<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV — Valentina Cortés-Urra</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 12px;
    }
    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--terracotta);
      font-weight: 500;
    }
    h1 {
      font-family: var(--serif);
      font-size: 3rem;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    h1 em { color: var(--terracotta); font-style: normal; }
    .back {
      margin-top: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--grey-300);
      border-bottom: 1px solid var(--grey-100);
      padding-bottom: 1px;
      transition: color 0.2s;
    }
    .back:hover { color: var(--terracotta); border-color: var(--terracotta); }
  </style>
</head>
<body>
  <p class="eyebrow">Curriculum Vitae</p>
  <h1>Available soon<em>.</em></h1>
  <a href="/" class="back">← Back to profile</a>
</body>
</html>
