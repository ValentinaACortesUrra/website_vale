<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr. Valentina Cortés-Urra — Coming Soon</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --white:             #f8f4ee;
      --off-white:         #f2eee7;
      --grey-100:          #d4d0ca;
      --grey-300:          #a09c96;
      --grey-500:          #6a6660;
      --grey-800:          #2c2a28;
      --ink:               #181614;

      --terracotta:        #b85c3e;
      --terracotta-mid:    #c97055;
      --terracotta-light:  #d9896d;
      --terracotta-pale:   #f0ddd7;
      --terracotta-faint:  #faf3f0;

      --sidebar-bg:        #2e1919;
      --sidebar-text:      #e8ddd8;

      --serif: 'Playfair Display', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;

      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; }

    body {
      font-family: var(--sans);
      background: var(--white);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      height: 64px;
      background: rgba(210, 90, 68, 0.91);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      padding: 0 40px;
      flex-shrink: 0;
    }
    .nav-brand {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.01em;
      text-decoration: none;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .card {
      background: var(--off-white);
      border: 1px solid var(--grey-100);
      border-radius: 4px;
      max-width: 560px;
      width: 100%;
      padding: 56px 52px;
      text-align: center;
      animation: fadeUp 0.6s var(--ease) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--terracotta);
      margin-bottom: 20px;
    }

    h1 {
      font-family: var(--serif);
      font-size: 2.4rem;
      font-weight: 400;
      line-height: 1.15;
      color: var(--grey-800);
      margin-bottom: 8px;
    }
    h1 em {
      color: var(--terracotta);
      font-style: italic;
    }

    .divider {
      width: 36px;
      height: 2px;
      background: var(--terracotta-pale);
      margin: 24px auto;
      border-radius: 2px;
    }

    p {
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 300;
      line-height: 1.75;
      color: var(--grey-500);
    }

    .contact-line {
      margin-top: 32px;
      font-size: 0.78rem;
      color: var(--grey-300);
      letter-spacing: 0.02em;
    }
    .contact-line a {
      color: var(--terracotta);
      text-decoration: none;
      border-bottom: 1px solid var(--terracotta-pale);
      transition: border-color 0.2s;
    }
    .contact-line a:hover {
      border-color: var(--terracotta);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      color: var(--grey-300);
      border-top: 1px solid var(--grey-100);
      flex-shrink: 0;
    }

    @media (max-width: 520px) {
      nav { padding: 0 20px; }
      .card { padding: 40px 28px; }
      h1 { font-size: 1.9rem; }
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-brand">Valentina Cortés-Urra</span>
  </nav>

  <main>
    <div class="card">
      <div class="eyebrow">Academic Portfolio</div>
      <h1>Under construction<em>.</em></h1>
      <div class="divider"></div>
      <p>
        This website is currently being built and will be live soon.
        Thank you for your patience.
      </p>
      <p class="contact-line">
        In the meantime, feel free to reach out by
        <a href="mailto:v.a.cortes.urra@tue.nl">email</a>.
      </p>
    </div>
  </main>

  <footer>
    © <span id="year"></span> Valentina Cortés-Urra · TU Eindhoven
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
